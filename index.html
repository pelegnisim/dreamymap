<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Dreamy by Peleg — קרוון בישראל</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1117;display:flex;justify-content:center;align-items:center;height:100svh;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
    #gameWrapper{position:relative;display:inline-block;max-width:100%;overflow:hidden}
    canvas{display:block;border:2px solid #30a0ff;border-radius:10px;box-shadow:0 0 40px rgba(48,160,255,.3);cursor:crosshair;max-width:100vw;max-height:100svh;width:auto;height:auto;touch-action:none}
    #modalClose{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#ccc;font-size:18px;cursor:pointer;width:34px;height:34px;line-height:34px;border-radius:50%;text-align:center;z-index:999;touch-action:manipulation;padding:0}
    #modalClose:hover{background:rgba(255,255,255,.28);color:#fff}

    #modal{
      display:none;position:absolute;
      left:33.75%;top:50%;transform:translate(-50%,-50%);
      background:linear-gradient(135deg,#0d1b3e,#1a2a50);
      border:2px solid #30a0ff;border-radius:16px;
      padding:22px 20px;width:min(340px, calc(100vw - 20px));
      color:#fff;z-index:100;direction:rtl;
      box-shadow:0 0 50px rgba(48,160,255,.5),inset 0 0 20px rgba(48,160,255,.08)
    }
    .m-emoji{font-size:38px;display:block;text-align:center;margin-bottom:2px}
    .m-title{font-size:21px;font-weight:bold;color:#ffd700;text-align:center;margin-bottom:3px}
    .m-sub{font-size:12px;color:#8899bb;text-align:center;margin-bottom:12px}
    .attr-btn{
      display:block;width:100%;padding:9px 13px;margin:5px 0;
      background:rgba(48,160,255,.12);border:1px solid rgba(48,160,255,.45);
      border-radius:10px;color:#fff;font-size:13px;cursor:pointer;
      transition:all .15s;text-align:right;direction:rtl
    }
    .attr-btn:hover{background:rgba(48,160,255,.3);border-color:#30a0ff;transform:translateX(-2px)}
    .attr-pts{color:#ffd700;font-weight:bold;float:left;font-size:12px}
    .attr-done{
      padding:8px 13px;margin:5px 0;
      background:rgba(0,200,80,.08);border:1px solid #2a5a3a;
      border-radius:10px;color:#4a8a5a;font-size:13px;text-align:right;
      direction:rtl;opacity:0.7
    }
    .skip-btn{
      display:block;width:100%;padding:7px;margin-top:10px;
      background:transparent;border:1px solid #223;
      border-radius:8px;color:#556;font-size:12px;cursor:pointer;transition:all .15s
    }
    .skip-btn:hover{color:#aaa;border-color:#556}

    #triviaAttrName{font-size:13px;color:#88aacc;text-align:center;margin-bottom:10px;font-weight:bold}
    #triviaTimerBar{width:100%;height:11px;background:#111827;border-radius:6px;overflow:hidden;margin-bottom:3px}
    #triviaTimerFill{height:100%;width:100%;background:#4caf50;border-radius:6px}
    #triviaTimeNum{font-size:11px;color:#8899bb;text-align:center;margin-bottom:14px}
    #triviaQ{font-size:15px;font-weight:bold;color:#fff;margin-bottom:16px;text-align:center;line-height:1.45}
    .t-opt{
      display:block;width:100%;padding:9px 13px;margin:5px 0;
      background:rgba(255,255,255,.07);border:1px solid #334;
      border-radius:10px;color:#ccc;font-size:13px;cursor:pointer;
      transition:all .15s;text-align:center
    }
    .t-opt:hover{background:rgba(255,255,255,.15);border-color:#667}
    .t-opt.correct{background:rgba(76,175,80,.35)!important;border-color:#4caf50!important;color:#fff!important}
    .t-opt.wrong  {background:rgba(244,67,54,.35)!important;border-color:#f44336!important;color:#fff!important}

    #resultIcon{font-size:50px;text-align:center;margin-bottom:6px}
    #resultText{font-size:19px;font-weight:bold;text-align:center;margin-bottom:5px}
    #resultPts{font-size:13px;color:#aaa;text-align:center;margin-bottom:16px;line-height:1.4}
    #resultBtn{
      display:block;width:100%;padding:12px;
      background:linear-gradient(135deg,#1a5496,#30a0ff);
      border:none;border-radius:10px;
      color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:transform .15s
    }
    #resultBtn:hover{transform:scale(1.02)}

    #victory{
      display:none;position:absolute;top:0;left:0;
      width:100%;height:100%;
      background:rgba(5,10,30,0.93);
      flex-direction:column;align-items:center;justify-content:center;
      z-index:200;border-radius:10px;direction:rtl;text-align:center;
      padding:30px
    }
    #victoryReplay{
      padding:14px 36px;
      background:linear-gradient(135deg,#1a5496,#30a0ff);
      border:none;border-radius:12px;
      color:#fff;font-size:18px;font-weight:bold;cursor:pointer;
      transition:transform .15s;margin-top:6px
    }
    #victoryReplay:hover{transform:scale(1.05)}
    #victoryShare{padding:10px 28px;background:transparent;border:2px solid #30a0ff;border-radius:12px;color:#30a0ff;font-size:15px;cursor:pointer;transition:all .15s;margin-top:8px}
    #victoryShare:hover{background:rgba(48,160,255,.15);transform:scale(1.03)}
  </style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="canvas" width="800" height="620"></canvas>
  <div id="victory">
    <div style="font-size:64px;margin-bottom:8px">🇮🇱 🎉 🚐</div>
    <div style="font-size:26px;font-weight:bold;color:#ffd700;margin-bottom:12px">סיימתם לטייל במדינת ישראל!</div>
    <div id="victoryScore" style="font-size:72px;font-weight:bold;color:#30a0ff;line-height:1"></div>
    <div style="font-size:13px;color:#8899bb;margin-bottom:10px">נקודות</div>
    <div id="victoryAttrs" style="font-size:15px;color:#fff;margin-bottom:6px"></div>
    <div id="victoryHigh" style="font-size:14px;color:#ffd700;margin-bottom:22px"></div>
    <button id="victoryReplay">שחקו שוב 🔄</button>
    <button id="victoryShare">שתפו ניקוד 📤</button>
  </div>
  <div id="modal">
    <button id="modalClose">✕</button>
    <div id="screenCity">
      <span class="m-emoji" id="modEmoji"></span>
      <div class="m-title" id="modTitle"></div>
      <div class="m-sub">בחרו אטרקציה לביקור:</div>
      <div id="modAttractions"></div>
      <button class="skip-btn" id="skipBtn">אולי אחר כך... 👋</button>
    </div>
    <div id="screenTrivia" style="display:none">
      <div id="triviaAttrName"></div>
      <div id="triviaTimerBar"><div id="triviaTimerFill"></div></div>
      <div id="triviaTimeNum">20 שניות</div>
      <div id="triviaQ"></div>
      <div id="triviaOptions"></div>
    </div>
    <div id="screenExplanation" style="display:none">
      <div id="expIcon" style="font-size:40px;text-align:center;margin-bottom:6px"></div>
      <div id="expTitle" style="font-size:15px;font-weight:bold;text-align:center;margin-bottom:10px;color:#ffd700"></div>
      <div id="expText" style="font-size:13px;color:#d0e8ff;line-height:1.65;text-align:right;margin-bottom:18px;direction:rtl;background:rgba(48,160,255,.07);border-radius:10px;padding:12px"></div>
      <button id="expBtn" style="display:block;width:100%;padding:11px;background:linear-gradient(135deg,#1a5496,#30a0ff);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer">הבנתי! 👍</button>
    </div>
    <div id="screenResult" style="display:none">
      <div id="resultIcon"></div>
      <div id="resultText"></div>
      <div id="resultPts"></div>
      <button id="resultBtn">המשיכו לטייל! 🚐</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const W = 800, H = 620, MAP_W = 540;
const PANEL_X = 545, PANEL_W = 255;
const MX = 155, MY = 30;
const PORTRAIT_PANEL_H = 200;

const caravanImg = new Image();
caravanImg.src = 'Dreamy_Sticker-removebg-preview.png';

const ISRAEL = [
  [62,0],[140,6],[172,42],[178,108],
  [162,152],[178,202],[184,252],[190,302],
  [194,356],[176,402],[158,458],[152,502],
  [146,526],[132,530],[108,524],[78,468],
  [53,412],[23,358],[8,312],[4,262],
  [4,208],[11,152],[21,98],[28,62],
  [40,28],[62,0],
];

// ═══════════════════════════════════════════════════════════════
// CITIES + ATTRACTIONS + TRIVIA
// ═══════════════════════════════════════════════════════════════
const CITIES = [
  {
    name:'ראש הניקרה', emoji:'🌊', mx:36, my:18, color:'#80cbc4',
    attractions:[
      { name:'המנהרות', pts:20, trivia:[
        {q:'מהו חומר הסלע שממנו עשויות המנהרות?', opts:['גיר לבן','בזלת שחורה','גרניט אדום'], a:0,
         exp:'גיר הוא סלע שנוצר מבעלי חיים ימיים קטנטנים שחיו לפני 100 מיליון שנה! השלדים שלהם הצטברו לשכבות עבות ונהפכו לאבן. המים ממיסים גיר ויוצרים מנהרות ומערות — ולכן מנהרות ראש הניקרה כה ייחודיות!'},
        {q:'מי חצב את מנהרות ראש הניקרה בתקופת המנדט?', opts:['הצרפתים','הבריטים','הטורקים'], a:1,
         exp:'הבריטים פוצצו את הסלע ב-1942 כדי לאפשר למסילת רכבת לעבור מלבנון לישראל! זה היה חלק ממסילה שחיברה קהיר לביירות. ב-1948 הצבא הישראלי פוצץ את הגשר כדי למנוע מהלבנונים להיכנס לישראל.'},
      ]},
      { name:'פארק החוף', pts:15, trivia:[
        {q:'כמה מטרים גובה המצוק בראש הניקרה?', opts:['70 מטר','20 מטר','150 מטר'], a:0,
         exp:'70 מטר — גובה בניין 22 קומות — ישר מעל מים טורקיזים! הלבנים הלבנות הן קירות גיר שנשחקו על ידי הים לאורך אלפי שנים. בסופות חורף הגלים מתנפצים עד לפסגת המצוק ויוצרים קצף ענק!'},
        {q:'ראש הניקרה נמצא על הגבול עם איזו מדינה?', opts:['סוריה','ירדן','לבנון'], a:2,
         exp:'ראש הניקרה הוא כמעט הנקודה הצפון-מערבית ביותר של ישראל — מצד שמאל תראו את לבנון! מאז 1949 הגבול סגור. לפני כן אנשים עברו בחופשיות בין חיפה לביירות ברכבת שעברה ממש דרך המנהרות.'},
      ]},
      { name:"ג'יפים בגבול", pts:25, trivia:[
        {q:'כמה ק"מ של גבול ים-יבשה יש בין ישראל ללבנון?', opts:['~2 ק"מ','~8 ק"מ','~15 ק"מ'], a:1,
         exp:'גבול ישראל-לבנון ממשיך לאורך 8 ק"מ לפני שמגיע לים בראש הניקרה. הגבול שם נקבע ב-1923 על ידי הבריטים והצרפתים — שניהם שלטו באזור. היום גדר ביטחון ממנעת מעבר.'},
        {q:'ראש הניקרה גובלת עם?', opts:['לבנון','סוריה','ירדן'], a:0,
         exp:'לבנון! השכנה הצפונית של ישראל. פעם שתי הארצות היו ידידותיות — בביירות הייתה קהילה יהודית גדולה. היום גבול ביטחוני מפריד ביניהן. מקוות שיום אחד יוכלו לטייל ביחד שוב!'},
      ]},
    ]
  },
  {
    name:'עכו', emoji:'🏰', mx:16, my:73, color:'#bcaaa4',
    attractions:[
      { name:'העיר העתיקה', pts:25, trivia:[
        {q:'בשנת כמה נצור נפוליאון על עכו?', opts:['1798','1799','1801'], a:1,
         exp:'נפוליאון הגיע ב-1799 עם 13,000 חיילים — ובטוח שיכבוש את עכו תוך ימים! אבל הוא לא חשב שהספינות הבריטיות של אדמירל סידני סמית\' יתפסו את תותחיו. המצור נמשך 62 יום ונפוליאון נסוג — זה עצר את כיבוש המזרח שלו!'},
        {q:'כמה ימים נמשך המצור של נפוליאון על עכו?', opts:['63 ימים','120 ימים','10 ימים'], a:0,
         exp:'63 יום! נפוליאון רצה לכבוש עכו ולהמשיך לסוריה, לעיראק, ולהודו — ולהיות שליט אסיה! הכישלון בעכו שבר אותו. הוא עצמו אמר: "עכו לקחה ממני את עתידי". אחר כך נסוג למצרים ואיבד גם שם.'},
      ]},
      { name:'שוק עכו', pts:15, trivia:[
        {q:'בשנת כמה הוכרזה עכו אתר מורשת עולמית?', opts:['1990','2001','2010'], a:1,
         exp:'ב-2001 אונסק"ו הכירה בעיר העתיקה של עכו כאתר מורשת עולמי! עכו היא אחת מהערים הבודדות בעולם שיש בהן שני אתרי מורשת עולמית שונים: עיר צלבנית תת-קרקעית ותרבות הבהאי.'},
        {q:'מה שם הצלבנים שבנו את המבנים ההיסטוריים בעכו?', opts:['אבירי יוחנן','פרנקים','טמפלרים'], a:0,
         exp:'אבירי יוחנן (Hospitaliers) היו אבירים נוצרים שניהלו בית חולים לצליינים בירושלים ואח"כ בעכו. הם בנו את הארמון התת-קרקעי המדהים שאפשר לבקר בו היום — שמור כמעט שלם מ-800 שנה!'},
      ]},
      { name:'מנהרות הצלבנים', pts:20, trivia:[
        {q:'כמה מ\' של מנהרות צלבניות נמצאות מתחת לעכו?', opts:['350 מ\'','1,000 מ\'','5,000 מ\''], a:0,
         exp:'350 מטר של מנהרות סודיות מחברות את ארמון הצלבנים לנמל! כך יכלו האבירים להתחמק בלחימה. המנהרות התגלו ב-1994 כשנשים מקומית דיווחה שביוב שלה זורם... למנהרה קדומה!'},
        {q:'מי בנה את מנהרות עכו בימי הביניים?', opts:['הפניקים','אבירי יוחנן','הרומאים'], a:1,
         exp:'אבירי יוחנן בנו את מנהרות עכו כחלק ממערכת הביצורים שלהם. הם שלטו בעכו 200 שנה (1104-1291) ובנו עיר שלמה מתחת לאדמה! כשהממלוקים כבשו את עכו, הם קברו הכול — ושמרו אותו לנו בצורה מושלמת.'},
      ]},
    ]
  },
  {
    name:'חיפה', emoji:'⛵', mx:22, my:98, color:'#4fc3f7',
    attractions:[
      { name:'גני בהאי', pts:20, trivia:[
        {q:'כמה גנים ומדרגות יש במתחם הבהאי בחיפה?', opts:['19','9','29'], a:0,
         exp:'19 טרסות (מדרגות-גנים) בגובה 1 ק"מ — אחד הגנים היפים בעולם! הגנים מסומטרים בדיוק מתמטי. אונסק"ו הכריזה עליהם אתר מורשת עולמית ב-2008. הכניסה חינם — אבל רק בסיור מודרך!'},
        {q:'אמונת הבהאי מגיעה במקורה מאיזו מדינה?', opts:['הודו','ערב הסעודית','איראן'], a:2,
         exp:'הבהאי נוסדה באיראן ב-1844 ע"י מירזא עלי מוחמד. האמונה מלמדת שכל הדתות הן אמת, ושהאנושות אחת. האיראנים רדפו את הבהאים — לכן המרכז העולמי שלהם הוא בחיפה, בישראל, שנתנה להם מקלט!'},
      ]},
      { name:'הר הכרמל', pts:15, trivia:[
        {q:'מה גובה הר הכרמל?', opts:['546 מטר','300 מטר','800 מטר'], a:0,
         exp:'546 מטר! הכרמל הוא למעשה רכס הרים, לא הר בודד — הוא מתפרש 39 ק"מ לאורך. אליהו הנביא "הרג" שם 450 נביאי הבעל בתחרות הגשם המפורסמת מתנ"ך! מנזר "מוכרמל" בפסגה בנוי ממש על המקום.'},
        {q:'הר הכרמל מתפרש לאורך כמה ק"מ?', opts:['20 ק"מ','39 ק"מ','60 ק"מ'], a:1,
         exp:'39 ק"מ! הכרמל חוצץ בין השרון לגליל, ממפרץ חיפה בצפון עד עמק יזרעאל בדרום. בתוכו יש עיירות, מנזרים, שמורת טבע ענקית, ו"דרך הכרמל" שנחשבת לאחת הצירים הטבעיים החשובים בהיסטוריה.'},
      ]},
      { name:'נמל חיפה', pts:10, trivia:[
        {q:'בשנת כמה נפתח נמל חיפה לסחר בינלאומי?', opts:['1920','1933','1948'], a:1,
         exp:'1933! הבריטים בנו את נמל חיפה ב-1929-1933 כי יפו כבר לא הספיקה. הם חפרו נמל מלאכותי בסלע עם שוברי גלים ענקיים. הנמל הציל אלפי יהודים שהגיעו מאירופה בזמן השואה — ולכן הוא קדוש לעם היהודי.'},
        {q:'מה הכינוי של חיפה בגלל שיש בה אוטובוסים בשבת?', opts:['"עיר שלא שובתת"','"עיר האדומים"','"עיר הדו-קיום"'], a:2,
         exp:'"עיר הדו-קיום"! חיפה ידועה בכך שיהודים, נוצרים ומוסלמים חיים בה יחד בשלום יחסי. היא גם העיר היחידה בישראל שיש בה אוטובוסים ציבוריים בשבת — תופעה נדירה! הבהאים גם בחרו בה כמרכז עולמי שלהם.'},
      ]},
    ]
  },
  {
    name:'טבריה', emoji:'🎣', mx:115, my:112, color:'#a5d6a7',
    attractions:[
      { name:'ים כינרת', pts:20, trivia:[
        {q:'מה שטח ים כינרת בקירוב?', opts:['50 קמ"ר','166 קמ"ר','400 קמ"ר'], a:1,

let audioCtx = null, melodyTimeout = null, melodySources = [];

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  else if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playNote(f, t, d) {
  if (!audioCtx || f === 0) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle'; o.frequency.value = f;
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + d * 0.88);
  o.start(t); o.stop(t + d); melodySources.push(o);
}
function stopMelody() {
  melodySources.forEach(s => { try { s.stop(0); } catch(e) {} });
  melodySources = [];
  if (melodyTimeout) { clearTimeout(melodyTimeout); melodyTimeout = null; }
}
function playMelody(key) {
  if (!audioCtx) return;
  const m = MELODIES[key]; if (!m) return;
  const bd = 60 / m.bpm;
  let t = audioCtx.currentTime + 0.05;
  m.notes.forEach(([f, d]) => { playNote(f, t, d * bd * 0.88); t += d * bd; });
  const total = m.notes.reduce((s, [,d]) => s + d * bd, 0);
  melodyTimeout = setTimeout(() => playMelody(key), (total - 0.05) * 1000);
}
function playCityMusic(name) { initAudio(); stopMelody(); playMelody(name); }
function playSuccessJingle() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [[N.C5,.08],[N.E5,.08],[N.G5,.08],[N.C5*2,.3]].forEach(([f,d],i) => playNote(f, t+i*.1, d));
}
function playFailJingle() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [[N.G4,.14],[N.Fs4,.14],[N.F4,.14],[N.E4,.3]].forEach(([f,d],i) => playNote(f, t+i*.15, d));
}

// TRIVIA — SHUFFLE
// ═══════════════════════════════════════════════════════════════
function shuffleQuestion(q) {
  const items = q.opts.map((opt, i) => ({ opt, correct: i === q.a }));
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  return { q: q.q, opts: items.map(s => s.opt), a: items.findIndex(s => s.correct), exp: q.exp };
}

let modalOpen = false;

const modal = document.getElementById('modal');

function showScreen(s) {
  document.getElementById('screenCity').style.display        = s==='city'        ? '' : 'none';
  document.getElementById('screenTrivia').style.display      = s==='trivia'      ? '' : 'none';
  document.getElementById('screenExplanation').style.display = s==='explanation' ? '' : 'none';

// ── Attraction list (shared by openModal & continueInCity) ────
function refreshAttractionList(city) {
  const cont = document.getElementById('modAttractions');
  cont.innerHTML = '';
  city.attractions.forEach(attr => {
    if (attr.done) {
      const div = document.createElement('div');
      div.className = 'attr-done';
      div.textContent = `✓ ${attr.name}`;
      cont.appendChild(div);
    } else {
      const btn = document.createElement('button');
      btn.className = 'attr-btn';
      btn.innerHTML = `${attr.name} <span class="attr-pts">+${attr.pts}</span>`;
      btn.onclick = () => startTrivia(attr);
      cont.appendChild(btn);
    }
  });
}

function openModal(city) {
  activeCity = city;
  modalOpen = true;
  modal.style.display = 'block';
  canvas.style.cursor = 'default';
  showScreen('city');
  document.getElementById('modEmoji').textContent = city.emoji;
  document.getElementById('modTitle').textContent = city.name;
  refreshAttractionList(city);
  // Fuel station button
  if (FUEL_STATIONS.has(city.name) && fuel < MAX_FUEL - 1) {
    const cost = Math.ceil((MAX_FUEL - fuel) * 0.4);
    const fb = document.createElement('button');
    fb.className = 'attr-btn';
    const canAfford = score >= cost;
    fb.style.borderColor = canAfford ? '#ffa000' : '#553';
    fb.style.color = canAfford ? '#ffd700' : '#665';
    fb.innerHTML = `⛽ תדלוק מלא <span class="attr-pts" style="color:${canAfford?'#ffa000':'#665'}">${canAfford ? `-${cost} נק\'` : '❌ חסרות נק\''}</span>`;
    if (canAfford) fb.onclick = () => { score -= cost; fuel = MAX_FUEL; closeModal(); };
    else fb.style.cursor = 'default';
    document.getElementById('modAttractions').appendChild(fb);
  }

  playCityMusic(city.name);
}

function continueInCity() {
  document.getElementById('modEmoji').textContent = activeCity.emoji;
  document.getElementById('modTitle').textContent = activeCity.name;
  refreshAttractionList(activeCity);
  showScreen('city');
}

// ── Trivia ────────────────────────────────────────────────────
function startTrivia(attr) {
  activeAttr = attr;
  triviaAnswered = false;
  activeQ = shuffleQuestion(attr.trivia[Math.floor(Math.random() * attr.trivia.length)]);

  showScreen('trivia');
  document.getElementById('triviaAttrName').textContent = `🎯 ${attr.name}`;
  document.getElementById('triviaQ').textContent = activeQ.q;

  const optCont = document.getElementById('triviaOptions');
  optCont.innerHTML = '';
  activeQ.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 't-opt';
    btn.textContent = opt;
    btn.onclick = () => answerTrivia(i, btn);
    optCont.appendChild(btn);
  });

  triviaTimeLeft = 20;
  updateTimerUI();
  triviaTimer = setInterval(() => {
    triviaTimeLeft = Math.max(0, triviaTimeLeft - 0.1);
    updateTimerUI();
    if (triviaTimeLeft <= 0) { clearInterval(triviaTimer); triviaTimer = null; answerTrivia(-1, null); }
  }, 100);

  stopMelody();
  playMelody('trivia');
}

function updateTimerUI() {
  const pct = triviaTimeLeft / 20;
  const fill = document.getElementById('triviaTimerFill');
  fill.style.width = (pct * 100) + '%';
  fill.style.background = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ffc107' : '#f44336';
  document.getElementById('triviaTimeNum').textContent = Math.ceil(triviaTimeLeft) + ' שניות';
}

function answerTrivia(chosenIdx, chosenBtn) {
  if (triviaAnswered) return;
  triviaAnswered = true;
  if (triviaTimer) { clearInterval(triviaTimer); triviaTimer = null; }

  document.querySelectorAll('.t-opt').forEach(b => { b.style.pointerEvents = 'none'; });

  const correct = chosenIdx === activeQ.a;
  const timeout = chosenIdx === -1;

  if (!timeout && chosenBtn) chosenBtn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    const opts = document.querySelectorAll('.t-opt');
    if (opts[activeQ.a]) opts[activeQ.a].classList.add('correct');
  }

  const earned = correct
    ? activeAttr.pts + Math.floor((triviaTimeLeft / 20) * activeAttr.pts * 0.5)
    : 0;

  stopMelody();
  if (correct) { playSuccessJingle(); spawnConfetti(); }
  else playFailJingle();

  setTimeout(() => showExplanation(correct, timeout, earned), 1000);
}

function showExplanation(correct, timeout, earned) {
  showScreen('explanation');
  document.getElementById('expIcon').textContent  = correct ? '💡' : '📖';
  document.getElementById('expTitle').textContent = correct ? 'נכון! הנה עוד על הנושא:' : 'הנה התשובה הנכונה:';
  document.getElementById('expText').textContent  = activeQ.exp || '';
  document.getElementById('expBtn').onclick = () => showResult(correct, timeout, earned);
}

function showResult(correct, timeout, earned) {
  activeAttr.done = true;
  if (correct) {
    correctStreak++;
    let streakBonus = 0;
    if (correctStreak >= 3) {
      streakBonus = 10;
      earned += streakBonus;
    }
    score += earned;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('dreamyHighScore', highScore);
    }
    visitLog.unshift(`${activeCity.name} — ${activeAttr.name} +${earned}`);
  } else {
    correctStreak = 0;
    visitLog.unshift(`${activeCity.name} — ${activeAttr.name} +0`);
  }
  if (visitLog.length > 6) visitLog.pop();
  saveGame();

  const streakTxt = correctStreak >= 3 ? ` 🔥×${correctStreak} +10 בונוס!` : '';
  showScreen('result');
  document.getElementById('resultIcon').textContent = correct ? '🎉' : (timeout ? '⏱️' : '❌');
  document.getElementById('resultText').textContent  = correct
    ? `תשובה נכונה!${streakTxt}`
    : (timeout ? 'פג הזמן!' : 'תשובה שגויה...');
  document.getElementById('resultPts').textContent   = correct
    ? `+${earned} נקודות (בונוס מהירות כלול! 🚀)`
    : `0 נקודות — שווה לדעת לפעם הבאה 💡`;

  const btn = document.getElementById('resultBtn');
  const allDone = activeCity.attractions.every(a => a.done);
  if (!allDone) {
    btn.textContent = 'בחרו עוד אטרקציה! 🗺️';
    btn.onclick = continueInCity;
  } else {
    btn.textContent = 'המשיכו לטייל! 🚐';
    btn.onclick = closeModal;
  }

  // Check if all attractions everywhere are done — trigger victory!
  const totalDone = CITIES.reduce((s, c) => s + c.attractions.filter(a => a.done).length, 0);
  const totalAll  = CITIES.reduce((s, c) => s + c.attractions.length, 0);
  if (totalDone === totalAll) setTimeout(showVictory, 1200);
}

document.getElementById('skipBtn').onclick = () => {
  if (activeCity) activeCity.snoozed = true;
  closeModal();
};

function closeModal() {
  if (triviaTimer) { clearInterval(triviaTimer); triviaTimer = null; }
  modal.style.display = 'none';
  modalOpen = false;
  activeCity = null; activeAttr = null; activeQ = null;
  clickTarget = null;
  canvas.style.cursor = 'crosshair';
  stopMelody();
}

function showVictory() {
  closeModal();
  const totalAttr = CITIES.reduce((s, c) => s + c.attractions.length, 0);
  document.getElementById('victoryScore').textContent = score;
  document.getElementById('victoryAttrs').textContent = `${totalAttr} אטרקציות — שחקנים מדהימים! 🌟`;
  document.getElementById('victoryHigh').textContent =
    score >= highScore ? `🏆 שיא חדש! ${score} נקודות` : `שיא: ${highScore} נקודות`;
  document.getElementById('victory').style.display = 'flex';
  stopMelody();
}

function resetGame() {
  score = 0;
  fuel = 100;
  visitLog.length = 0;
  particles = [];
  CITIES.forEach(c => {
    c.snoozed = false;
    c.attractions.forEach(a => { a.done = false; });
  });
  caravan.x = -200;
  caravan.y = -200;
  caravan.rotation = 0;
  clickTarget = null;
  selectingStart = true;
  mapZoom = 1; mapPanX = 0; mapPanY = 0;
  document.getElementById('victory').style.display = 'none';
}

function saveGame() {
  try {
    localStorage.setItem('dreamySave', JSON.stringify({
      score, fuel, correctStreak,
      caravanX: caravan.x, caravanY: caravan.y,
      selectingStart,
      visitLog: [...visitLog],
      cities: CITIES.map(c => ({
        snoozed: c.snoozed || false,
        attractions: c.attractions.map(a => a.done || false)
      }))
    }));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('dreamySave');
    if (!raw) return false;
    const s = JSON.parse(raw);
    score = s.score || 0;
    fuel = s.fuel ?? 100;
    correctStreak = s.correctStreak || 0;
    caravan.x = s.caravanX ?? -200;
    caravan.y = s.caravanY ?? -200;
    selectingStart = s.selectingStart ?? true;
    visitLog.length = 0;
    (s.visitLog || []).forEach(v => visitLog.push(v));
    (s.cities || []).forEach((cs, i) => {
      if (!CITIES[i]) return;
      CITIES[i].snoozed = cs.snoozed;
      cs.attractions.forEach((done, j) => {
        if (CITIES[i].attractions[j]) CITIES[i].attractions[j].done = done;
      });
    });
    return true;
  } catch(e) { return false; }
}

document.getElementById('victoryReplay').onclick = () => {
  localStorage.removeItem('dreamySave');
  correctStreak = 0;
  resetGame();
};

}

// ═══════════════════════════════════════════════════════════════
// CANVAS + PORTRAIT MODE
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let portraitMode = false;

function isPortraitMobile() {
  return window.innerWidth < 650 && window.innerWidth < window.innerHeight;
}

function resizeCanvas() {
  portraitMode = isPortraitMobile();
  const modal = document.getElementById('modal');
  if (portraitMode) {
    canvas.width  = MAP_W;
    canvas.height = H + PORTRAIT_PANEL_H;
    modal.style.left = '50%';
    modal.style.top  = (H / 2) + 'px';
  } else {
    canvas.width  = W;
    canvas.height = H;
    modal.style.left = '33.75%';
    modal.style.top  = '50%';
  }
}
window.addEventListener('resize', resizeCanvas);

// Click-to-move
function handleCanvasClick(tx, ty) {
  if (modalOpen) return;
  initAudio();
  // Convert canvas coords to map-space (accounting for zoom/pan)
  const mapX = (tx - mapPanX) / mapZoom;
  const mapY = (ty - mapPanY) / mapZoom;
  if (selectingStart) {
    // Find nearest city to click and place caravan there
    let best = null, bestDist = Infinity;
    CITIES.forEach(c => {
      const d = Math.hypot(mapX - c.cx, mapY - c.cy);
      if (d < bestDist) { bestDist = d; best = c; }
    });
    if (best && bestDist < 80) {
      caravan.x = best.cx;
      caravan.y = best.cy;
      selectingStart = false;
    }
    return;
  }
  if (mapX >= 0 && mapX < MAP_W && mapY >= 0 && mapY < H) clickTarget = { x: mapX, y: mapY };
}
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleCanvasClick(
    (e.clientX - rect.left) * (W / rect.width),
    (e.clientY - rect.top)  * (H / rect.height)
  );
});
// Touch handling — pinch zoom + pan + tap
let _touchState = { lastDist: 0, lastX: 0, lastY: 0, isPinch: false };
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  if (e.touches.length === 2) {
    _touchState.isPinch = true;
    _touchState.lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    _touchState.lastX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    _touchState.lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  } else {
    _touchState.isPinch = false;
    _touchState.lastX = e.touches[0].clientX;
    _touchState.lastY = e.touches[0].clientY;
    // Single tap → click-to-move
    handleCanvasClick(
      (e.touches[0].clientX - rect.left) * (W / rect.width),
      (e.touches[0].clientY - rect.top)  * (H / rect.height)
    );
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const midX = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * scaleX;
    const midY = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) * scaleY;
    const newZoom = Math.max(1, Math.min(4, mapZoom * (dist / _touchState.lastDist)));
    mapPanX = midX - (midX - mapPanX) * (newZoom / mapZoom);
    mapPanY = midY - (midY - mapPanY) * (newZoom / mapZoom);
    mapZoom = newZoom;
    _touchState.lastDist = dist;
  } else if (mapZoom > 1 && !_touchState.isPinch) {
    // Pan with single finger when zoomed
    const dx = (e.touches[0].clientX - _touchState.lastX) * scaleX;
    const dy = (e.touches[0].clientY - _touchState.lastY) * scaleY;
    mapPanX = Math.min(0, Math.max(MAP_W * (1 - mapZoom), mapPanX + dx));
    mapPanY = Math.min(0, Math.max(H * (1 - mapZoom), mapPanY + dy));
    _touchState.lastX = e.touches[0].clientX;
    _touchState.lastY = e.touches[0].clientY;
  }
}, { passive: false });

// Mouse wheel zoom (desktop)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top)  * (H / rect.height);
  const newZoom = Math.max(1, Math.min(4, mapZoom * (e.deltaY < 0 ? 1.12 : 0.89)));
  mapPanX = mx - (mx - mapPanX) * (newZoom / mapZoom);
  mapPanY = my - (my - mapPanY) * (newZoom / mapZoom);
  if (newZoom === 1) { mapPanX = 0; mapPanY = 0; }
  mapZoom = newZoom;
}, { passive: false });

function mp(x, y) { return [MX + x, MY + y]; }

const TRAIL_POINTS = [
  [130,48],[110,52],[95,68],[115,112],
  [100,148],[82,138],[45,115],[13,153],
  [6,198],[8,243],[10,250],[15,262],
  [7,308],[65,398],[78,455],[128,498],
];

function drawTrail() {
  ctx.save();
  ctx.setLineDash([5,4]);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#ff6600aa';
  ctx.beginPath();
  TRAIL_POINTS.forEach(([mx,my],i) => {
    const x = MX+mx, y = MY+my;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 8px Arial';
  ctx.fillStyle='#ff6600bb';
  ctx.textAlign='left';
  ctx.fillText('🥾 שביל ישראל', MX+3, MY+510);
  ctx.restore();
}

// ── Map ──────────────────────────────────────────────────────
function drawMap() {
  ctx.fillStyle = '#1a4a7a';
  ctx.fillRect(0, 0, MAP_W, H);
  const grad = ctx.createLinearGradient(0, MY, 0, MY + 530);
  grad.addColorStop(0,    '#4a7c42');
  grad.addColorStop(0.45, '#7a8c3a');
  grad.addColorStop(0.72, '#b89040');
  grad.addColorStop(1,    '#c49a30');
  ctx.beginPath();
  const [sx, sy] = mp(ISRAEL[0][0], ISRAEL[0][1]);
  ctx.moveTo(sx, sy);
  for (let i = 1; i < ISRAEL.length; i++) {
    const [px, py] = mp(ISRAEL[i][0], ISRAEL[i][1]);
    ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#2d5a28'; ctx.lineWidth = 2; ctx.stroke();
  drawTrail();
  ctx.font = 'bold 12px Arial';
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.textAlign = 'center';
  ctx.fillText('N ↑', MX + 100, MY + 13);
}

// ── Cities ───────────────────────────────────────────────────
function drawCities() {
  const now = Date.now();
  CITIES.forEach(c => {
    const { cx, cy, color, name, attractions } = c;
    const doneCount = attractions.filter(a => a.done).length;
    const allDone = doneCount === attractions.length;
    const anyDone = doneCount > 0;

    // Pulsing ring
    if (!allDone) {
      const pulse = 0.5 + 0.5 * Math.sin(now / 600 + cx * 0.05);
      ctx.beginPath();
      ctx.arc(cx, cy, 14 + pulse * 4, 0, Math.PI * 2);
      ctx.strokeStyle = color + (anyDone ? '88' : '55');
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
    ctx.fillStyle = allDone ? 'rgba(255,215,0,.3)' : (anyDone ? color + '66' : color + '44');
    ctx.fill();
    ctx.strokeStyle = allDone ? '#ffd700' : color;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.emoji, cx, cy);
    ctx.textBaseline = 'alphabetic';

    // Star status
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    if (allDone) ctx.fillText('⭐', cx, cy - 15);
    else if (anyDone) ctx.fillText('☆', cx, cy - 14);

    // Remaining badge
    const remaining = attractions.length - doneCount;
    if (anyDone && !allDone && remaining > 0) {
      ctx.beginPath();
      ctx.arc(cx + 11, cy - 10, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#ff7700';
      ctx.fill();
      ctx.font = 'bold 9px Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(remaining, cx + 11, cy - 7);
    }

    // Fuel station indicator
    if (FUEL_STATIONS.has(c.name)) {
      ctx.font = '9px Arial'; ctx.textAlign = 'left'; ctx.fillStyle = '#ffa000';
      ctx.fillText('⛽', cx + 11, cy + 2);
    }

    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
    ctx.fillText(name, cx, cy + 20);
    ctx.shadowBlur = 0;
  });
}

// ── Click target indicator ────────────────────────────────────
function drawClickTarget() {
  if (!clickTarget) return;
  ctx.save();
  ctx.setLineDash([4, 5]);
  ctx.strokeStyle = 'rgba(255,255,255,.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(caravan.x, caravan.y);
  ctx.lineTo(clickTarget.x, clickTarget.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(clickTarget.x, clickTarget.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.fill();
  ctx.restore();
}

// ── Caravan ──────────────────────────────────────────────────
function drawCaravan() {
  const { x, y, bounceT, rotation } = caravan;
  const by = Math.sin(bounceT) * 3;

  ctx.beginPath();
  ctx.ellipse(x, y + 26, 32, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.3)';
  ctx.fill();

  ctx.save();
  ctx.translate(x, y + by);
  ctx.rotate(rotation);  // Rolling rotation
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  if (caravanImg.complete && caravanImg.naturalWidth > 0) {
    ctx.drawImage(caravanImg, -55, -55, 110, 110);
  } else {
    ctx.font = '40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚐', 0, 0);
  }
  ctx.restore();
}

// ── Score Panel ───────────────────────────────────────────────
function drawPanel() {
  ctx.fillStyle = '#080e1e';
  ctx.fillRect(PANEL_X, 0, PANEL_W, H);
  ctx.strokeStyle = '#30a0ff22'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PANEL_X, 0); ctx.lineTo(PANEL_X, H); ctx.stroke();

  const cx = PANEL_X + PANEL_W / 2;

  ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('🚐 קרוון בישראל', cx, 35);
  ctx.font = '10px Arial'; ctx.fillStyle = '#334';
  ctx.fillText('Dreamy by Peleg', cx, 50);

  ctx.strokeStyle = '#1a2a40';
  ctx.beginPath(); ctx.moveTo(PANEL_X+12,58); ctx.lineTo(PANEL_X+PANEL_W-12,58); ctx.stroke();

  ctx.font = 'bold 50px Arial'; ctx.fillStyle = '#30a0ff'; ctx.textAlign = 'center';
  ctx.fillText(score, cx, 112);
  ctx.font = '11px Arial'; ctx.fillStyle = '#6699bb';
  ctx.fillText('נקודות', cx, 128);
  if (highScore > 0) {
    ctx.font = '10px Arial'; ctx.fillStyle = '#ffd70099';
    ctx.fillText(`שיא: ${highScore}`, cx, 142);
  }

  // Fuel gauge
  const fuelLbl = fuel <= 0 ? '⛽ ריק! מצאו תחנה!' : fuel < 20 ? '⚠️ דלק נמוך!' : `⛽ דלק: ${Math.ceil(fuel)}%`;
  ctx.font = 'bold 10px Arial';
  ctx.fillStyle = fuel < 20 ? '#f44336' : '#ffa000';
  ctx.textAlign = 'center';
  ctx.fillText(fuelLbl, cx, 156);
  const fgw = PANEL_W - 28, fgx = PANEL_X + 14;
  ctx.fillStyle = '#111827'; ctx.fillRect(fgx, 161, fgw, 8);
  const fuelColor = fuel < 20 ? '#f44336' : fuel < 40 ? '#ffc107' : '#4caf50';
  if (fuel > 0) { ctx.fillStyle = fuelColor; ctx.fillRect(fgx, 161, fgw * fuel / MAX_FUEL, 8); }
  ctx.strokeStyle = '#ffa00044'; ctx.strokeRect(fgx, 161, fgw, 8);

  // Cities progress
  const totalAttrDone = CITIES.reduce((s, c) => s + c.attractions.filter(a => a.done).length, 0);
  const totalAttr = CITIES.reduce((s, c) => s + c.attractions.length, 0);

  ctx.font = 'bold 20px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(`${totalAttrDone} / ${totalAttr}`, cx, 194);
  ctx.font = '10px Arial'; ctx.fillStyle = '#6699bb';
  ctx.fillText('אטרקציות שבוצעו', cx, 207);

  // Progress bar (attractions)
  const pw = PANEL_W - 28, px = PANEL_X + 14;
  ctx.fillStyle = '#111827'; ctx.fillRect(px, 215, pw, 8);
  if (totalAttrDone > 0) {
    ctx.fillStyle = '#30a0ff';
    ctx.fillRect(px, 215, pw * totalAttrDone / totalAttr, 8);
  }
  ctx.strokeStyle = '#30a0ff44'; ctx.strokeRect(px, 215, pw, 8);

  ctx.strokeStyle = '#1a2a40';
  ctx.beginPath(); ctx.moveTo(PANEL_X+12,231); ctx.lineTo(PANEL_X+PANEL_W-12,231); ctx.stroke();

  ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'right';
  ctx.fillText('ביקורים אחרונים:', PANEL_X + PANEL_W - 12, 246);
  visitLog.slice(0, 5).forEach((entry, i) => {
    ctx.font = i === 0 ? 'bold 10px Arial' : '10px Arial';
    ctx.fillStyle = i === 0 ? '#ddeeff' : '#3d5577';
    ctx.textAlign = 'right';
    const t = entry.length > 27 ? entry.slice(0, 26) + '…' : entry;
    ctx.fillText(t, PANEL_X + PANEL_W - 12, 262 + i * 17);
  });

  const citiesLeft = CITIES.filter(c => c.attractions.some(a => !a.done)).length;
  ctx.font = '10px Arial'; ctx.fillStyle = '#88aacc'; ctx.textAlign = 'center';
  ctx.fillText(`🏙️ ערים שנותרו: ${citiesLeft}`, cx, 348);

  if (totalAttrDone === totalAttr) {
    ctx.font = 'bold 13px Arial'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'center';
    ctx.fillText('🎉 סיימת את כל הארץ!', cx, 370);
    ctx.font = '11px Arial'; ctx.fillStyle = '#aaa';
    ctx.fillText(`סה"כ: ${score} נקודות`, cx, 386);
  }

  ctx.strokeStyle = '#1a2a40';
  ctx.beginPath(); ctx.moveTo(PANEL_X+12,H-58); ctx.lineTo(PANEL_X+PANEL_W-12,H-58); ctx.stroke();

  ctx.font = '10px Arial'; ctx.fillStyle = '#334455'; ctx.textAlign = 'center';
  ctx.fillText('⌨️ חצים / WASD | 🖱️ לחצו על המפה', cx, H-38);
  ctx.fillText('📍 גשו לערים לגלות אטרקציות', cx, H-20);
}

// ── Portrait Panel ────────────────────────────────────────────
function drawPanelPortrait() {
  const py = H, pw = MAP_W, ph = PORTRAIT_PANEL_H;
  const col = pw / 3; // ~180px per column

  // Background
  ctx.fillStyle = '#080e1e';
  ctx.fillRect(0, py, pw, ph);
  ctx.strokeStyle = '#30a0ff33'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(pw, py); ctx.stroke();

  // Vertical dividers
  [col, col*2].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, py+8); ctx.lineTo(x, py+ph-8); ctx.stroke();
  });

  const totalAttrDone = CITIES.reduce((s, c) => s + c.attractions.filter(a => a.done).length, 0);
  const totalAttr = CITIES.reduce((s, c) => s + c.attractions.length, 0);

  // === LEFT: Title + Score ===
  ctx.textAlign = 'center';
  ctx.font = 'bold 11px Arial'; ctx.fillStyle = '#ffd700';
  ctx.fillText('🚐 קרוון בישראל', col*0.5, py+20);
  ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#30a0ff';
  ctx.fillText(score, col*0.5, py+70);
  ctx.font = '11px Arial'; ctx.fillStyle = '#6699bb';
  ctx.fillText('נקודות', col*0.5, py+88);
  if (highScore > 0) {
    ctx.font = '10px Arial'; ctx.fillStyle = '#ffd70099';
    ctx.fillText(`שיא: ${highScore}`, col*0.5, py+104);
  }

  // === MIDDLE: Fuel + Progress ===
  const mx = col;
  const fuelLbl = fuel <= 0 ? '⛽ ריק!' : fuel < 20 ? '⚠️ נמוך!' : `⛽ ${Math.ceil(fuel)}%`;
  ctx.font = 'bold 10px Arial';
  ctx.fillStyle = fuel < 20 ? '#f44336' : '#ffa000';
  ctx.textAlign = 'center';
  ctx.fillText(fuelLbl, mx + col/2, py+22);
  const fgw = col-24, fgx = mx+12;
  ctx.fillStyle = '#111827'; ctx.fillRect(fgx, py+28, fgw, 8);
  const fc = fuel < 20 ? '#f44336' : fuel < 40 ? '#ffc107' : '#4caf50';
  if (fuel > 0) { ctx.fillStyle = fc; ctx.fillRect(fgx, py+28, fgw*fuel/MAX_FUEL, 8); }
  ctx.strokeStyle = '#ffa00044'; ctx.strokeRect(fgx, py+28, fgw, 8);

  ctx.font = 'bold 18px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(`${totalAttrDone} / ${totalAttr}`, mx+col/2, py+62);
  ctx.font = '10px Arial'; ctx.fillStyle = '#6699bb';
  ctx.fillText('אטרקציות', mx+col/2, py+76);
  const pgw = col-24, pgx = mx+12;
  ctx.fillStyle = '#111827'; ctx.fillRect(pgx, py+82, pgw, 7);
  if (totalAttrDone > 0) { ctx.fillStyle = '#30a0ff'; ctx.fillRect(pgx, py+82, pgw*totalAttrDone/totalAttr, 7); }
  ctx.strokeStyle = '#30a0ff44'; ctx.strokeRect(pgx, py+82, pgw, 7);

  const citiesLeftP = CITIES.filter(c => c.attractions.some(a => !a.done)).length;
  ctx.font = '9px Arial'; ctx.fillStyle = '#88aacc'; ctx.textAlign = 'center';
  ctx.fillText(`🏙️ ערים: ${citiesLeftP}`, mx+col/2, py+100);
  ctx.font = '9px Arial'; ctx.fillStyle = '#334455'; ctx.textAlign = 'center';
  ctx.fillText('👆 גע | 🤏 זום', mx+col/2, py+ph-10);

  // === RIGHT: Recent visits ===
  const rx = col*2;
  ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'right';
  ctx.fillText('ביקורים:', col*3-12, py+20);
  visitLog.slice(0, 6).forEach((entry, i) => {
    ctx.font = i === 0 ? 'bold 10px Arial' : '9px Arial';
    ctx.fillStyle = i === 0 ? '#ddeeff' : '#3d5577';
    ctx.textAlign = 'right';
    const t = entry.length > 22 ? entry.slice(0,21)+'…' : entry;
    ctx.fillText(t, col*3-12, py+36+i*16);
  });
}

// ═══════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════
function update() {
  if (modalOpen) return;

  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= caravan.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += caravan.speed;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= caravan.speed;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += caravan.speed;

  // Click-to-move
  if (clickTarget && dx === 0 && dy === 0) {
    const cdx = clickTarget.x - caravan.x;
    const cdy = clickTarget.y - caravan.y;
    const dist = Math.hypot(cdx, cdy);
    if (dist < 6) {
      clickTarget = null;
    } else {
      const spd = Math.min(caravan.speed, dist);
      dx += (cdx / dist) * spd;
      dy += (cdy / dist) * spd;
    }
  }

  // Consume fuel while moving
  const movedForFuel = Math.hypot(dx, dy);
  if (movedForFuel > 0) {
    fuel = Math.max(0, fuel - movedForFuel / 30);
    if (fuel === 0) { dx = 0; dy = 0; }
  }

  if (dx !== 0) caravan.facing = dx > 0 ? 1 : -1;
  caravan.moving = dx !== 0 || dy !== 0;

  // Bounce
  if (caravan.moving) caravan.bounceT += 0.3;
  else caravan.bounceT *= 0.85;

  // Rolling rotation — sticker spins as it rolls
  const moved = Math.hypot(dx, dy);
  if (moved > 0) {
    const dir = dx !== 0 ? Math.sign(dx) : caravan.facing;
    caravan.rotation += dir * moved * 0.025;
  }

  caravan.x = Math.max(80, Math.min(MAP_W - 30, caravan.x + dx));
  caravan.y = Math.max(40, Math.min(H - 40, caravan.y + dy));

  // Un-snooze when moved away
  CITIES.forEach(c => {
    if (c.snoozed && Math.hypot(caravan.x - c.cx, caravan.y - c.cy) > 70) c.snoozed = false;
  });

  // Proximity check — open if any attraction not done
  for (const city of CITIES) {
    if (city.snoozed) continue;
    const anyLeft = city.attractions.some(a => !a.done);
    if (!anyLeft) continue;
    if (Math.hypot(caravan.x - city.cx, caravan.y - city.cy) < 28) {
      openModal(city);
      break;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
  if (!selectingStart) update();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // MAP area — apply zoom/pan transform, clipped to map region
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, MAP_W, H); ctx.clip();
  ctx.translate(mapPanX, mapPanY);
  ctx.scale(mapZoom, mapZoom);
  drawMap();
  drawClickTarget();
  drawCities();
  if (!selectingStart) drawCaravan();
  // Confetti particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  // Panel — no zoom
  if (portraitMode) drawPanelPortrait(); else drawPanel();

  // Fuel warning: red pulsing border
  if (fuel < 20 && fuel > 0) {
    const alpha = 0.25 + 0.55 * Math.abs(Math.sin(Date.now() / 350));
    ctx.save();
    ctx.strokeStyle = `rgba(244,67,54,${alpha})`;
    ctx.lineWidth = 9;
    ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);
    ctx.restore();
  }

  // Start-city selection overlay (map area only)
  if (selectingStart) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.50)';
    ctx.fillRect(0, 0, MAP_W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🏠 בחרי עיר להתחלה', MAP_W / 2, H / 2 - 10);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#aad4ff';
    ctx.fillText('לחצי על כל עיר במפה', MAP_W / 2, H / 2 + 20);
    ctx.restore();
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life -= 0.018; });
  particles = particles.filter(p => p.life > 0);

  requestAnimationFrame(loop);
}

loadGame(); // Restore previous session if any
resizeCanvas(); // Set correct canvas size before first frame
if (caravanImg.complete && caravanImg.naturalWidth > 0) loop();
else { caravanImg.onload = loop; caravanImg.onerror = loop; }
</script>
</body>
</html>
